services:
  - type: web
    name: stocksight-backend
    env: python
    region: oregon
    plan: free
    rootDir: server
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn src.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_SECRET
        sync: false
      - key: ALPHA_VANTAGE_KEY
        sync: false
      - key: CORS_ORIGIN
        sync: false
      - key: ENVIRONMENT
        value: production
